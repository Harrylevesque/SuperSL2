<!DOCTYPE html>
<html lang="en">
<head>
<title>WebAuthn Demo</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; }
  .hero-btn {
    width: 100%;
    max-width: 520px;
    min-height: 88px;
    border: 0;
    border-radius: 16px;
    font-size: 30px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #5c6cff, #7b5cff);
    box-shadow: 0 16px 36px rgba(92, 108, 255, 0.35);
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    margin: 16px 0;
  }
  .hero-btn:hover { transform: translateY(-1px); box-shadow: 0 20px 40px rgba(92, 108, 255, 0.45); }
  .hero-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
  .hidden { display: none; }
</style>
</head>
<body>
<h1>WebAuthn Demo (/webauth)</h1>

<div id="manual-controls">
  <label for="sv_uuid">Service UUID (sv-... or sv--...)</label>
  <input id="sv_uuid" type="text" placeholder="sv--xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" style="margin-bottom:10px; display:block;" />
  <label for="svu_uuid">Service User UUID (svu--...)</label>
  <input id="svu_uuid" type="text" placeholder="svu--xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" style="margin-bottom:10px; display:block;" />
  <button onclick="register()">Register</button>
  <button onclick="authenticate()">Authenticate</button>
</div>

<input id="sv_uuid_hidden" type="hidden" />
<input id="svu_uuid_hidden" type="hidden" />
<button id="complete-signup-btn" class="hero-btn hidden" type="button">Complete Signup</button>

<div id="status"></div>
<div id="completion-embed"></div>

<script type="module">
import { startRegistration, startAuthentication } from 'https://cdn.jsdelivr.net/npm/@simplewebauthn/browser@10/+esm';

const BASE_URL = `${window.location.origin}/webauth`;
const query = new URLSearchParams(window.location.search);
const mode = (query.get('mode') || '').trim().toLowerCase();
const querySvUuid = (query.get('sv-uuid') || query.get('sv_uuid') || '').trim();
const querySvuUuid = (query.get('svu-uuid') || query.get('svu_uuid') || '').trim();

function status(msg, color='black') {
  document.getElementById('status').innerHTML += `<p style="color:${color}">${msg}</p>`;
}

function getIdentifiers() {
  const hiddenSv = document.getElementById('sv_uuid_hidden').value.trim();
  const hiddenSvu = document.getElementById('svu_uuid_hidden').value.trim();
  if (mode === 'register' && hiddenSv && hiddenSvu) {
    return { sv_uuid: hiddenSv, svu_uuid: hiddenSvu };
  }
  return {
    sv_uuid: document.getElementById('sv_uuid').value.trim(),
    svu_uuid: document.getElementById('svu_uuid').value.trim(),
  };
}

function initModeUi() {
  if (mode !== 'register') {
    return;
  }

  document.getElementById('manual-controls').classList.add('hidden');
  document.getElementById('sv_uuid_hidden').value = querySvUuid;
  document.getElementById('svu_uuid_hidden').value = querySvuUuid;

  const cta = document.getElementById('complete-signup-btn');
  cta.classList.remove('hidden');
  cta.addEventListener('click', register);

  if (!querySvUuid || !querySvuUuid) {
    cta.disabled = true;
    status('Missing query params. Expected mode=register&sv-uuid=...&svu-uuid=...', 'red');
    return;
  }

  status('Ready to complete signup.', '#555');
}

async function parseJsonOrThrow(resp, action) {
  if (!resp.ok) {
    const body = await resp.text();
    throw new Error(`${action} failed (${resp.status}): ${body || 'No response body'}`);
  }
  return resp.json();
}

function normalizeWebAuthnOptions(opts) {
  if (!opts || typeof opts !== 'object') {
    return null;
  }
  // Support both { publicKey: ... } and direct options JSON from server.
  return opts.publicKey && typeof opts.publicKey === 'object' ? opts.publicKey : opts;
}

async function register() {
  const { sv_uuid, svu_uuid } = getIdentifiers();
  if (!sv_uuid || !svu_uuid) {
    status('Please enter both sv_uuid and svu_uuid.', 'red');
    return;
  }
  try {
    status('Starting registration...');
    const resp = await fetch(`${BASE_URL}/register/start?sv_uuid=${encodeURIComponent(sv_uuid)}&svu_uuid=${encodeURIComponent(svu_uuid)}`);
    const startPayload = await parseJsonOrThrow(resp, 'Registration start');
    const opts = normalizeWebAuthnOptions(startPayload);
    if (!opts || !opts.challenge || !opts.user) {
      status('Registration failed: Invalid options from server', 'red');
      return;
    }
    if (startPayload.registration_context) {
      status(`Registration context loaded for ${startPayload.registration_context.sv_uuid} / ${startPayload.registration_context.svu_uuid}`);
    }
    let attResp;
    try {
      attResp = await startRegistration(opts);
    } catch (e) { status('Registration failed: ' + e, 'red'); return; }
    const verification = await fetch(`${BASE_URL}/register/finish`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ ...attResp, sv_uuid, svu_uuid })
    });
    const result = await parseJsonOrThrow(verification, 'Registration finish');
    status(result.verified ? 'Registration success!' : 'Registration failed', result.verified ? 'green' : 'red');
    if (result.verified) {
      status(`Returned serviceuuid: ${result.serviceuuid || 'n/a'}`);
      showCompletionConfettiEmbed();
    }
  } catch (e) {
    status('Error: ' + e.message, 'red');
  }
}

async function authenticate() {
  const { sv_uuid, svu_uuid } = getIdentifiers();
  if (!sv_uuid || !svu_uuid) {
    status('Please enter both sv_uuid and svu_uuid.', 'red');
    return;
  }
  try {
    status('Starting authentication...');
    const resp = await fetch(`${BASE_URL}/auth/start?sv_uuid=${encodeURIComponent(sv_uuid)}&svu_uuid=${encodeURIComponent(svu_uuid)}`);
    const opts = normalizeWebAuthnOptions(await parseJsonOrThrow(resp, 'Auth start'));
    if (!opts || !opts.challenge) {
      status('Auth failed: Invalid options from server', 'red');
      return;
    }
    let attResp;
    try {
      attResp = await startAuthentication(opts);
    } catch (e) { status('Auth failed: ' + e, 'red'); return; }
    const verification = await fetch(`${BASE_URL}/auth/finish`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ ...attResp, sv_uuid, svu_uuid })
    });
    const result = await parseJsonOrThrow(verification, 'Auth finish');
    status(result.verified ? 'Auth success!' : 'Auth failed', result.verified ? 'green' : 'red');
    if (result.verified) {
      showCompletionConfettiEmbed();
    }
  } catch (e) {
    status('Error: ' + e.message, 'red');
  }
}

function showCompletionConfettiEmbed() {
  if (document.getElementById('codepen-confetti-embed')) {
    return;
  }

  const mount = document.getElementById('completion-embed');
  if (!mount) {
    return;
  }

  const p = document.createElement('p');
  p.id = 'codepen-confetti-embed';
  p.className = 'codepen';
  p.setAttribute('data-height', '300');
  p.setAttribute('data-pen-title', 'Congrats confetti');
  p.setAttribute('data-default-tab', 'html,result');
  p.setAttribute('data-slug-hash', 'ZEBLepW');
  p.setAttribute('data-user', 'l2zeo');
  p.style.height = '300px';
  p.style.boxSizing = 'border-box';
  p.style.display = 'flex';
  p.style.alignItems = 'center';
  p.style.justifyContent = 'center';
  p.style.border = '2px solid';
  p.style.margin = '1em 0';
  p.style.padding = '1em';

  const span = document.createElement('span');
  span.append('See the Pen ');

  const penLink = document.createElement('a');
  penLink.href = 'https://codepen.io/l2zeo/pen/ZEBLepW';
  penLink.textContent = 'Congrats confetti';
  span.appendChild(penLink);
  span.append(' by junajuan (');

  const userLink = document.createElement('a');
  userLink.href = 'https://codepen.io/l2zeo';
  userLink.textContent = '@l2zeo';
  span.appendChild(userLink);
  span.append(') on ');

  const codepenLink = document.createElement('a');
  codepenLink.href = 'https://codepen.io';
  codepenLink.textContent = 'CodePen';
  span.appendChild(codepenLink);
  span.append('.');

  p.appendChild(span);
  mount.appendChild(p);

  if (!document.getElementById('codepen-embed-script')) {
    const script = document.createElement('script');
    script.id = 'codepen-embed-script';
    script.async = true;
    script.src = 'https://public.codepenassets.com/embed/index.js';
    mount.appendChild(script);
  } else if (window.__CPEmbed) {
    window.__CPEmbed();
  }
}

window.register = register;
window.authenticate = authenticate;
initModeUi();
</script>
</body>
</html>
